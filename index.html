function scrollToForm(){document.getElementById('formSection').scrollIntoView({behavior:'smooth'});}function toggleDarkMode(){document.body.classList.toggle('dark');localStorage.setItem('ce-dark-mode',document.body.classList.contains('dark')?'yes':'no');}window.addEventListener('load',function(){if(localStorage.getItem('ce-dark-mode')==='yes')document.body.classList.add('dark');});
function getValue(id){return document.getElementById(id).value.trim();}function validateForm(){const form=document.getElementById('ceForm');if(!form.checkValidity()){form.reportValidity();return false;}return true;}function formatLongDate(v){if(!v)return'';const d=new Date(v+'T00:00:00');return d.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});}function addDays(v,days){if(!v)return '';const d=new Date(v+'T00:00:00');d.setDate(d.getDate()+days);return d.toISOString().slice(0,10);}function todayLong(){return new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});}function createRecordId(){const d=new Date();return 'CE-'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'-'+(Math.floor(Math.random()*9000)+1000);}function escapeHtml(s){return String(s||'').replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});}
function getPayload(){const data={firstName:getValue('firstName'),middleName:getValue('middleName'),surname:getValue('surname'),email:getValue('email'),purpose:getValue('purpose'),degree:getValue('degree'),institution:getValue('institution'),country:getValue('country'),technicalPanel:getValue('technicalPanel'),applicationDate:getValue('applicationDate'),taskManager:getValue('taskManager')};data.fullName=[data.firstName,data.middleName,data.surname].filter(Boolean).join(' ');data.dateGenerated=formatLongDate(data.applicationDate)||todayLong();data.emailDateLong=formatLongDate(data.applicationDate);data.artaDateLong=formatLongDate(addDays(data.applicationDate,7));data.recordId=createRecordId();return data;}
function commonHeader(){return '<div class="doc-header"><img class="ched" src="'+CHED_LOGO+'"><div class="gov-title"><div>Republic of the Philippines</div><div>OFFICE OF THE PRESIDENT</div><div class="ched-title">COMMISSION ON HIGHER EDUCATION</div></div><img class="bp" src="'+BP_LOGO+'"></div>';}
function commonFooter(data){return '<div class="initials">PC/S4/P30</div><div class="footer">Higher Education Development Center Building, C.P. Garcia Ave., UP Campus, Diliman, Quezon City, Philippines<br>Web Site: www.ched.gov.ph Tel Nos. 441 – 1177, 385-4391, 441-1149, 441-1170, 441-1216, 392-5296, 441-1220<br>441-1228, 988-0002, 441-0750, 441-1254, 441-1235, 441-1255, 441-8910, 441-1171, 352-1871</div>';}
function opsdReplyHTML(data){return '<section class="pdf-page">'+commonHeader()+'<div class="doc-date">'+escapeHtml(data.dateGenerated)+'</div><div class="recipient"><div>'+escapeHtml(data.fullName)+'</div><div>Email Address: '+escapeHtml(data.email)+'</div></div><div class="body"><p>Dear '+escapeHtml(data.surname)+':</p><p>This pertains to your application dated '+escapeHtml(data.emailDateLong)+', requesting for the issuance of a CHED Certificate of Equivalency of your foreign degree, '+escapeHtml(data.degree)+', obtained from '+escapeHtml(data.institution)+', '+escapeHtml(data.country)+', to be considered as equivalent to a relevant degree offered in Philippine higher education institutions.</p><p>Please be informed that your documents will be referred to the relevant CHED Technical Panel/Committee, for their evaluation and appropriate recommendation of the degree obtained, and to the CHED International Affairs Staff, for verification of the accreditation status and program offerings of '+escapeHtml(data.institution)+', '+escapeHtml(data.country)+', where the degree was obtained.</p><p>Likewise, please be informed that the Technical Panels/Committees, in the course of their evaluation, may require additional documents and/or an interview.</p><p>In the meantime, for any other clarification or inquiry, you may contact our Programs Development Division at Telephone Number, 8709-4379 or email us at equivalency@ched.gov.ph.</p><p>Thank you.</p><div class="closing">Very truly yours,</div><div class="signature"><div class="name">DR. JIMMY G. CATANES, CESE</div><div>Director IV, Office of Programs and Standards Development (OPSD)</div><div class="by">BY:</div><br><br><div class="name">DR. BUENAVENTURA D. MACATANGAY</div><div>Chief, Programs Development Division, OPSD</div></div></div>'+commonFooter(data)+'</section>';}
function iasVerificationHTML(data){return '<section class="pdf-page">'+commonHeader()+'<div class="doc-date">'+escapeHtml(data.dateGenerated)+'</div><div class="recipient"><div class="bold">DR. CHRISTINE NABOR-FERRER</div><div>Director-in-Charge, International Affairs Staff (IAS)</div><div>This Commission</div></div><div class="subject">Subject: Request for Verification/Validation on the Accreditation Status<br>of '+escapeHtml(data.institution)+', '+escapeHtml(data.country)+'</div><div class="body"><p>Madam:</p><p>This pertains to the request of '+escapeHtml(data.fullName)+' for issuance of a CHED Certificate of Equivalency for his/her foreign degree, '+escapeHtml(data.degree)+' obtained from '+escapeHtml(data.institution)+', '+escapeHtml(data.country)+', to be considered equivalent to a relevant degree/program offered in Philippine higher education institutions.</p><p>In this regard, may we kindly request assistance from your Office in verifying/validating the status of '+escapeHtml(data.institution)+', '+escapeHtml(data.country)+', through your international linkages with the appropriate government entity/embassy in '+escapeHtml(data.country)+'.</p><p>Your immediate action on the matter is highly appreciated.</p><p>Thank you.</p><div class="closing">Very truly yours,</div><div class="signature"><div class="name">DR. JIMMY G. CATANES, CESE</div><div>Director IV, Office of Programs and Standards Development (OPSD)</div><div class="by">BY:</div><br><br><div class="name">DR. BUENAVENTURA D. MACATANGAY</div><div>Chief, Programs Development Division, OPSD</div></div></div>'+commonFooter(data)+'</section>';}
function indorsementHTML(data){return '<section class="pdf-page">'+commonHeader()+'<div class="indorsement-title">1st Indorsement</div><div>'+escapeHtml(data.dateGenerated)+'</div><div class="body" style="margin-top:26px"><p class="indent">Respectfully referred to the Members of the CHED Technical Panel for '+escapeHtml(data.technicalPanel)+', the herein request of '+escapeHtml(data.fullName)+', for the issuance of a CHED Certificate of Equivalency, '+escapeHtml(data.degree)+' degree, obtained from '+escapeHtml(data.institution)+', '+escapeHtml(data.country)+', can be considered equivalent to a relevant degree/program offered in Philippine higher education institutions.</p><p class="indent">Considering the urgency of the request and in compliance with R.A. No. 11032 (Ease of Doing Business and Efficient Delivery of Government Services), may we request that the result of your evaluation would reach this Office on or before '+escapeHtml(data.artaDateLong)+'.</p><p>Thank you.</p><div class="signature" style="margin-left:365px"><div class="name">DR. JIMMY G. CATANES, CESE</div><div>Director IV</div><div>Office of Programs and Standards Development (OPSD)</div><div class="by">BY:</div><br><br><div class="name">DR. BUENAVENTURA D. MACATANGAY</div><div>Chief, Programs Development Division, OPSD</div></div></div>'+commonFooter(data)+'</section>';}
function buildTemplates(data){return[{key:'opsdReplyWord',filename:data.recordId+' - OPSD PDD Reply - '+data.surname+'.doc',html:opsdReplyHTML(data)},{key:'iasVerificationWord',filename:data.recordId+' - IAS Verification - '+data.surname+'.doc',html:iasVerificationHTML(data)},{key:'indorsementWord',filename:data.recordId+' - Technical Panel Indorsement - '+data.surname+'.doc',html:indorsementHTML(data)}];}
function htmlToWordFile(t){
  const css=`#{style.gsub('`','\`').gsub('${','\${')}`;
  const html='<!DOCTYPE html><html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="UTF-8"><!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom><w:DoNotOptimizeForBrowser/></w:WordDocument></xml><![endif]--><style>'+css+' body{background:#ffffff !important;color:#000000 !important;} #docWorkspace{position:static !important;left:auto !important;top:auto !important;} .pdf-page{page-break-after:always;margin:0 auto;} </style></head><body>'+t.html+'</body></html>';
  return new Blob(['\ufeff',html],{type:'application/msword'});
}
function blobToBase64(blob){return new Promise(function(resolve,reject){const r=new FileReader();r.onloadend=function(){resolve(r.result.split(',')[1]);};r.onerror=reject;r.readAsDataURL(blob);});}
async function makeAllWordFiles(data){const templates=buildTemplates(data);const files=[];for(const t of templates){showStatus('ok','Generating '+t.filename+' ...');const blob=htmlToWordFile(t);const base64=await blobToBase64(blob);files.push({key:t.key,filename:t.filename,mimeType:'application/msword',base64:base64});}return files;}
function base64ToBlob(base64,mime){const bytes=atob(base64);const arr=new Uint8Array(bytes.length);for(let i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);return new Blob([arr],{type:mime});}
async function submitAndSendWordFiles(){
  if(!validateForm())return;
  if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL.includes('PASTE_YOUR')){
    showStatus('err','Please paste your Apps Script Web App URL first.');
    return;
  }
  const btn=document.getElementById('submitBtn');
  try{
    btn.disabled=true;
    btn.textContent='Submitting...';
    const data=getPayload();
    showStatus('ok','Generating Word files and sending to '+data.taskManager+'...');
    const files=await makeAllWordFiles(data);
    const payload=Object.assign({},data,{wordFiles:files});
    await fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    showStatus('ok','Submitted. The 3 Word files were sent to '+data.taskManager+'.');
    document.getElementById('ceForm').reset();
  }catch(error){
    showStatus('err','Submission failed: '+error.message);
  }finally{
    btn.disabled=false;
    btn.textContent='Submit';
  }
}
function showStatus(type,message){const status=document.getElementById('status');status.className='status '+type;status.textContent=message;}
</script></body></html>
